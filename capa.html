<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Exportación 2026 — Xalingo</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Quicksand', sans-serif;
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  .capa {
    position: relative;
    width: 100%;
    max-width: 900px;
    line-height: 0;
  }

  .capa img {
    display: block;
    width: 100%;
    height: auto;
  }

  .capa-overlay {
    position: absolute;
    bottom: 3.5%;
    right: 4%;
    z-index: 10;
  }

  .btn-nav {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 32px;
    background: rgba(240, 160, 48, 0.95);
    color: white;
    text-decoration: none;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.4px;
    backdrop-filter: blur(8px);
    border: 2px solid rgba(255,255,255,0.25);
    box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    transition: all 0.25s ease;
    animation: pulseGlow 2.5s ease-in-out infinite;
  }

  .btn-nav:hover {
    background: rgba(240, 160, 48, 1);
    transform: scale(1.05);
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  }

  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
    50% { box-shadow: 0 8px 30px rgba(0,0,0,0.35), 0 0 28px rgba(240,160,48,0.35); }
  }

  .btn-nav svg { transition: transform 0.2s; }
  .btn-nav:hover svg { transform: translateX(4px); }
</style>
</head>
<body>

<div class="capa">
  <img src="CAPA2026EXP.jpg" alt="Capa — Catálogo Exportación 2026 Xalingo">
  <div class="capa-overlay">
    <a href="sobre.html" class="btn-nav">
      Sobre la empresa
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14m0 0l-7-7m7 7l-7 7"/></svg>
    </a>
  </div>
</div>

</body>
</html>
