<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Exportación — Xalingo</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--text:#1B3A5C;--soft:rgba(27,58,92,.5);--accent:#1B3A5C;--gold:#f0a030;--bg:#fff;--surf:#f8f7f5;--bdr:rgba(0,0,0,.08);--green:#2e7d32;--orange:#e65100;--r:13px;
  --vc-blocos:#7C6EB5;--vc-edu:#6B87C7;--vc-jogos:#E06B55;--vc-faz:#3EBDAD;--vc-rodados:#5DB85A;--vc-esporte:#D4A030;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Quicksand',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

.hdr{background:var(--accent);padding:22px 36px;display:flex;align-items:center;justify-content:space-between}
.htitle{font-family:'Fredoka',sans-serif;font-size:1.5rem;font-weight:700;color:#fff}
.htitle span{color:var(--gold)}
.hsub{font-size:.7rem;color:rgba(255,255,255,.4);margin-top:3px}
.hbadge{display:inline-block;background:var(--gold);color:#fff;font-size:.56rem;font-weight:700;padding:2px 8px;border-radius:100px;margin-top:5px}
.hstats{display:flex;gap:20px}
.hn{font-family:'Fredoka',sans-serif;font-size:1.4rem;font-weight:700;color:var(--gold);line-height:1;text-align:center}
.hl{font-size:.56rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;text-align:center}

.toolbar{position:sticky;top:0;z-index:30;background:#fff;border-bottom:1px solid var(--bdr);padding:9px 36px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.sw{flex:1;min-width:150px;position:relative}
.sw input{width:100%;padding:8px 12px 8px 32px;border:1.5px solid var(--bdr);border-radius:9px;font-family:'Quicksand',sans-serif;font-size:.82rem;font-weight:600;color:var(--text);background:var(--surf)}
.sw input:focus{outline:none;border-color:var(--accent)}
.sw input::placeholder{color:rgba(27,58,92,.28)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:.75rem;opacity:.28}
.sel{padding:8px 9px;border:1.5px solid var(--bdr);border-radius:9px;font-family:'Quicksand',sans-serif;font-size:.74rem;font-weight:700;color:var(--text);background:var(--surf)}
.vt{display:flex;gap:2px;background:var(--surf);border-radius:7px;padding:2px;border:1.5px solid var(--bdr)}
.vb{width:30px;height:30px;border:none;background:transparent;border-radius:5px;cursor:pointer;font-size:.78rem;display:flex;align-items:center;justify-content:center;color:var(--soft)}
.vb.on{background:var(--accent);color:#fff}
.cnt{font-size:.68rem;font-weight:700;color:var(--soft);white-space:nowrap}

.frow{background:#fff;border-bottom:1px solid var(--bdr);padding:10px 36px;display:flex;align-items:center;gap:8px;overflow-x:auto}
.frow::-webkit-scrollbar{display:none}
.flbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--soft);white-space:nowrap;flex-shrink:0}
.fbtn{font-family:'Quicksand',sans-serif;font-size:.8rem;font-weight:700;padding:7px 15px;border-radius:100px;border:2px solid var(--bdr);background:#fff;color:var(--soft);cursor:pointer;white-space:nowrap;transition:all .15s}
.fbtn.on{background:var(--fbtn-vc,var(--accent));color:#fff !important;border-color:var(--fbtn-vc,var(--accent))}
.fsep{width:1px;height:20px;background:var(--bdr);flex-shrink:0}

.wrap{padding:20px 36px 80px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:13px}
.grid.lst{grid-template-columns:1fr;gap:4px}

.card{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .2s;border-left:4px solid var(--vc,var(--bdr))}
.card:hover{box-shadow:0 8px 32px rgba(0,0,0,.1);border-left-color:var(--vc,var(--accent));transform:translateY(-2px)}
.cimg{width:100%;aspect-ratio:1;background:var(--vc-bg,var(--surf));display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.cimg img{width:84%;height:84%;object-fit:contain;transition:transform .3s}
.card:hover .cimg img{transform:scale(1.05)}
.cph{font-size:2rem;opacity:.1}
.cspin{width:24px;height:24px;border:2.5px solid rgba(27,58,92,.1);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ctag{position:absolute;top:7px;left:7px;background:var(--vc,rgba(27,58,92,.8));color:#fff;font-size:.49rem;font-weight:700;padding:2px 7px;border-radius:100px;max-width:calc(100% - 44px);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.2px}
.cbody{padding:10px 12px 12px}
.cref{font-size:.55rem;font-weight:700;color:var(--soft);letter-spacing:.5px;margin-bottom:3px}
.cname{font-size:.75rem;font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:1.95em}
.csub{font-size:.61rem;font-weight:600;color:var(--soft);margin-top:4px}
.cfoot{display:flex;align-items:center;justify-content:space-between;margin-top:7px;gap:4px}
.sb{display:inline-flex;align-items:center;gap:3px;font-size:.59rem;font-weight:700;padding:3px 8px;border-radius:100px}
.sb.l{background:#e8f5e9;color:var(--green)}
.sb.z{background:#fff3e0;color:var(--orange)}
.sb.b{background:#111;color:#fff}
.sd{width:5px;height:5px;border-radius:50%}
.sb.l .sd{background:var(--green)}.sb.z .sd{background:var(--orange)}.sb.b .sd{background:#fff;opacity:.7}
.ext{display:inline-flex;align-items:center;justify-content:center;width:25px;height:25px;border-radius:7px;background:var(--surf);color:var(--soft);font-size:.72rem;text-decoration:none;border:1px solid var(--bdr)}
.ext:hover{background:var(--accent);color:#fff}

.grid.lst .card{display:flex;align-items:center}
.grid.lst .cimg{width:66px;height:66px;aspect-ratio:unset;flex-shrink:0;border-radius:8px;margin:5px}
.grid.lst .cbody{flex:1;padding:7px 10px}
.grid.lst .cname{-webkit-line-clamp:1}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:100;align-items:center;justify-content:center;padding:18px}
.ov.open{display:flex}
.mbox{background:#fff;border-radius:18px;max-width:780px;width:100%;display:flex;flex-direction:column;max-height:92vh;box-shadow:0 16px 48px rgba(0,0,0,.18);animation:mani .2s ease;position:relative;overflow:hidden}
@keyframes mani{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}

/* Top section: image (left) + ficha técnica (right) side-by-side */
.mtop{display:flex;flex-shrink:0;border-bottom:1px solid var(--bdr);max-height:340px}
.mhdr{background:var(--surf);display:flex;align-items:center;justify-content:center;flex:0 0 46%;min-height:280px;position:relative;padding:18px}
.mhdr img{max-width:90%;max-height:260px;object-fit:contain}
.mhdr .cph{font-size:3.5rem;opacity:.3}
.mside{flex:1;background:#fff;padding:18px 20px;overflow-y:auto;display:flex;flex-direction:column}

.mcls{position:absolute;top:11px;right:11px;width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,.95);cursor:pointer;font-size:.82rem;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--text);z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.mcls:hover{background:#fff;transform:scale(1.05)}

.mbody{padding:16px 21px 22px;overflow-y:auto}
.mref{font-size:.6rem;font-weight:700;color:var(--soft);letter-spacing:.7px}
.mtags{margin-top:4px;display:flex;flex-wrap:wrap;gap:4px}
.mv{background:var(--mv-vc,rgba(27,58,92,.08));color:var(--mv-vctxt,var(--accent));font-size:.59rem;font-weight:700;padding:2px 8px;border-radius:100px}
.ms{background:rgba(240,160,48,.12);color:#b07020;font-size:.59rem;font-weight:700;padding:2px 8px;border-radius:100px}
.mname{font-family:'Fredoka',sans-serif;font-size:1.12rem;font-weight:600;line-height:1.25;margin-top:9px}
.minfo{display:flex;align-items:center;gap:7px;margin-top:11px;flex-wrap:wrap}
.morig{font-size:.63rem;font-weight:700;background:#f4f4f4;color:var(--soft);padding:3px 9px;border-radius:100px}
.mlink{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:8px;background:rgba(27,58,92,.06);color:var(--accent);font-size:.7rem;font-weight:700;text-decoration:none}
.mlink:hover{background:rgba(27,58,92,.12)}

/* Ficha técnica vertical layout (now on the side) */
.ficha{margin:0}
.fttl{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--accent);margin-bottom:11px;display:flex;align-items:center;gap:5px}
.fg{display:flex;flex-direction:column;gap:6px}
.fi{background:var(--surf);border-radius:8px;padding:8px 12px;border:1px solid rgba(27,58,92,.04)}
.filbl{font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--soft);margin-bottom:3px}
.fival{font-size:.82rem;font-weight:700;color:var(--text);word-break:break-word}
.fload,.fnone{display:flex;align-items:center;gap:8px;font-size:.72rem;font-weight:600;color:var(--soft);padding:8px 0}
.fnone{font-style:italic;opacity:.7}

.bktop{display:none;position:fixed;bottom:20px;right:20px;width:37px;height:37px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:.9rem;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:50}
.bktop.show{display:flex}

@media(max-width:700px){
  .hdr,.toolbar,.frow,.wrap{padding-left:14px;padding-right:14px}
  .grid{grid-template-columns:repeat(2,1fr);gap:9px}
  .mbox{max-width:100%}
  .mtop{flex-direction:column;max-height:none}
  .mhdr{flex:none;min-height:200px}
  .mhdr img{max-height:200px}
  .mside{padding:14px 18px;border-top:1px solid var(--bdr)}
}
</style>
</head>

var VERT_ORDER = ['BLOCOS DE MONTAR','EDUCATIVOS','JOGOS','FAZ DE CONTA','RODADOS','ESPORTE'];
function vertIdx(v){ var i=VERT_ORDER.indexOf(v); return i>=0?i:99; }

function render(){
  var q = (document.getElementById('q').value||'').toLowerCase().trim();
  var sort = document.getElementById('sort').value;
  var list = PRODUCTS.filter(function(p){
    if(q && !p.nome.toLowerCase().includes(q) && !p.ref.includes(q)) return false;
    if(vF !== 'all' && p.vert !== vF) return false;
    if(sF !== 'all' && p.status !== sF) return false;
    return true;
  });
  list.sort(function(a,b){
    if(sort==='az') return a.nome.localeCompare(b.nome,'es');
    if(sort==='za') return b.nome.localeCompare(a.nome,'es');
    if(sort==='ra') return +a.ref - +b.ref;
    if(sort==='rd') return +b.ref - +a.ref;
    if(sort==='lz') return (b.status==='LANÇAMENTO'?1:0)-(a.status==='LANÇAMENTO'?1:0);
    // default: 'vert' — sort by vertical order, then by name within vertical
    var vi = vertIdx(a.vert) - vertIdx(b.vert);
    if(vi !== 0) return vi;
    return a.nome.localeCompare(b.nome,'es');
  });
  var g = document.getElementById('grid');
  g.className = vw==='list' ? 'grid lst' : 'grid';
  g.innerHTML = list.length ? list.map(cardHTML).join('') : '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--soft)">Ningún producto encontrado</div>';
  document.getElementById('cnt').textContent = list.length+' de '+PRODUCTS.length;
  document.getElementById('sT').textContent = list.length;
  document.getElementById('sL').textContent = list.filter(function(p){return p.status==='LANÇAMENTO';}).length;
}

// ── CORS-safe fetch helper ────────────────────────────────
// Tries direct → corsproxy.io → allorigins.win in sequence
var PROXIES = [
  function(u){ return u; },
  function(u){ return 'https://corsproxy.io/?url='+encodeURIComponent(u); },
  function(u){ return 'https://api.allorigins.win/raw?url='+encodeURIComponent(u); }
];

function proxyFetch(apiUrl, timeout){
  timeout = timeout || 10000;
  var i = 0;
  function next(){
    if(i >= PROXIES.length) return Promise.reject(new Error('Todos os proxies falharam'));
    var url = PROXIES[i++](apiUrl);
    return fetch(url, {signal: AbortSignal.timeout(timeout)})
      .then(function(r){
        if(!r.ok) throw new Error('HTTP '+r.status);
        return r.json();
      })
      .catch(function(err){
        console.warn('[CORS] tentativa '+(i)+' falhou ('+err.message+'), próximo proxy...');
        return next();
      });
  }
  return next();
}

var fichaC = {};
var WP = 'https://produtosxalingo.oneweb.com.br';

// Faz parse do HTML da ficha técnica - aceita <th> e <td>
function parseFicha(html){
  if(!html) return null;
  var rows = {};
  var trRe = /<tr[^>]*>([\s\S]*?)<\/tr>/gi, tm;
  while((tm = trRe.exec(html)) !== null){
    // Aceita células <td> OU <th> (a primeira linha da tabela WP costuma ser <th>)
    var cellRe = /<(?:td|th)[^>]*>([\s\S]*?)<\/(?:td|th)>/gi, cm, cells=[];
    while((cm = cellRe.exec(tm[1])) !== null){
      var text = cm[1]
        .replace(/<br\s*\/?>/gi,' ')
        .replace(/<[^>]+>/g,'')
        .replace(/&nbsp;/gi,' ')
        .replace(/&amp;/gi,'&')
        .replace(/&aacute;/gi,'á').replace(/&eacute;/gi,'é').replace(/&iacute;/gi,'í').replace(/&oacute;/gi,'ó').replace(/&uacute;/gi,'ú')
        .replace(/&atilde;/gi,'ã').replace(/&otilde;/gi,'õ').replace(/&ccedil;/gi,'ç')
        .replace(/\s+/g,' ')
        .trim();
      cells.push(text);
    }
    if(cells.length>=2 && cells[0] && cells[1]) rows[cells[0]]=cells[1];
  }
  return Object.keys(rows).length ? rows : null;
}

function fetchFicha(slug){
  var apiUrl = WP+'/wp-json/wp/v2/posts?slug='+encodeURIComponent(slug)+'&_fields=content&per_page=1';
  return proxyFetch(apiUrl, 12000)
    .then(function(posts){
      if(!posts || !posts.length) throw new Error('Post não encontrado: '+slug);
      var html = (posts[0] && posts[0].content && posts[0].content.rendered) || '';
      var data = parseFicha(html);
      if(!data) throw new Error('Tabela não encontrada: '+slug);
      return data;
    })
    .then(function(data){ fichaC[slug]=data; return data; })
    .catch(function(err){
      console.warn('[Ficha] sem dados para', slug, '-', err.message);
      fichaC[slug]=null;
      return null;
    });
}

function showFicha(data){
  document.getElementById('fload').style.display='none';
  if(!data){
    document.getElementById('ficha').style.display='none';
    document.getElementById('fnone').style.display='flex';
    return;
  }
  document.getElementById('fnone').style.display='none';
  var fg = document.getElementById('fg');
  fg.innerHTML='';
  var MAP={'Código':'Código','Código de Barras':'Cód. Barras','Comprimento':'Largo (cm)','Largura':'Ancho (cm)','Altura':'Alto (cm)','Peso':'Peso'};
  var ORDER=['Código','Código de Barras','Comprimento','Largura','Altura','Peso'];
  var dims=['Comprimento','Largura','Altura'];
  // só agrupa em "Dimensiones" se as 3 existem E pelo menos uma é diferente de 0
  var hasDims = dims.every(function(k){return data[k];}) &&
                dims.some(function(k){return parseFloat(String(data[k]).replace(',','.')) > 0;});
  var added = 0;
  ORDER.forEach(function(key){
    if(!data[key]) return;
    if(hasDims && dims.indexOf(key)>=0) return;
    fg.insertAdjacentHTML('beforeend','<div class="fi"><div class="filbl">'+(MAP[key]||key)+'</div><div class="fival">'+data[key]+'</div></div>');
    added++;
  });
  if(hasDims){
    fg.insertAdjacentHTML('beforeend','<div class="fi"><div class="filbl">Dimensiones (cm)</div><div class="fival">'+data['Comprimento']+' × '+data['Largura']+' × '+data['Altura']+'</div></div>');
    added++;
  }
  if(added===0){
    document.getElementById('ficha').style.display='none';
    document.getElementById('fnone').style.display='flex';
  } else {
    document.getElementById('ficha').style.display='block';
  }
}

function saveI(){ try{ localStorage.setItem(IKEY,JSON.stringify(imgC)); }catch(e){} }

function batchImg(slugs){
  var apiUrl=WP+'/wp-json/wp/v2/posts?'+slugs.map(function(s){return 'slug[]='+encodeURIComponent(s);}).join('&')+'&_fields=slug,yoast_head_json&per_page=100';
  return proxyFetch(apiUrl, 15000)
    .then(function(posts){
      var out={};
      posts.forEach(function(post){
        var img=(post.yoast_head_json&&post.yoast_head_json.og_image&&post.yoast_head_json.og_image[0]&&post.yoast_head_json.og_image[0].url)||'';
        if(img) out[post.slug]=img;
      });
      return out;
    })
    .catch(function(){ return {}; });
}

function preload(){
  PRODUCTS.forEach(function(p){ if(!p.img && p.slug && imgC[p.slug]) p.img=imgC[p.slug]; });
  render();
  var need=PRODUCTS.filter(function(p){return !p.img && p.slug && imgC[p.slug]===undefined;});
  if(!need.length) return;
  var slugs=need.map(function(p){return p.slug;});
  function batch(i){
    if(i>=slugs.length) return;
    var sl=slugs.slice(i,i+60);
    batchImg(sl).then(function(res){
      need.filter(function(p){return sl.indexOf(p.slug)>=0;}).forEach(function(p){
        var img=res[p.slug]||'';
        imgC[p.slug]=img;
        if(img) p.img=img;
      });
      saveI();
      render();
      batch(i+60);
    });
  }
  batch(0);
}

// Init
render();
preload();
</script>
</body>
</html>
